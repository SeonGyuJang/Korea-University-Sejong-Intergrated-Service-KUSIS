{% extends "base.html" %}

{% block title %}캘린더 - KUSIS{% endblock %}

{% block styles %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />
<link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css') }}">
{% endblock %}

{% block content %}
<div class="notion-calendar-wrapper">
    <!-- 좌측 사이드바 (노션 스타일) -->
    <aside class="calendar-sidebar-left">
        <!-- 미니 캘린더 -->
        <div class="mini-calendar-section">
            <div class="mini-calendar-header">
                <button class="nav-btn" id="miniPrevMonth">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span class="mini-title" id="miniCalendarTitle">2025년 10월</span>
                <button class="nav-btn" id="miniNextMonth">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div id="miniCalendar" class="mini-calendar-grid"></div>
            <button class="btn-today" id="todayBtn">
                <i class="fas fa-calendar-day"></i>
                오늘
            </button>
        </div>

        <!-- 카테고리 목록 -->
        <div class="categories-section">
            <div class="section-header">
                <h3>내 캘린더</h3>
                <button class="btn-icon" id="addCategoryBtn" title="카테고리 추가">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="categories-list" id="categoryList">
                <!-- JavaScript로 동적 생성 -->
            </div>
        </div>
    </aside>

    <!-- 중앙 메인 캘린더 영역 -->
    <main class="calendar-main-area">
        <div class="calendar-toolbar">
            <h1 class="calendar-title" id="calendarMainTitle">2025년 10월</h1>
            <div class="toolbar-controls">
                <div class="view-switcher">
                    <button class="view-btn" data-view="dayGridMonth">월</button>
                    <button class="view-btn active" data-view="timeGridWeek">주</button>
                    <button class="view-btn" data-view="timeGridDay">일</button>
                </div>
            </div>
        </div>
        <div id="calendar" class="fullcalendar-container"></div>
    </main>

    <!-- 우측 패널 (노션 스타일) -->
    <aside class="calendar-sidebar-right">
        <!-- 기본 뷰 (단축키 등) -->
        <div class="right-panel-default" id="rightPanelDefault">
            <div class="quick-add-section">
                <h3>빠른 일정 추가</h3>
                <form id="quickAddForm">
                    <input type="text" id="quickAddInput" placeholder="일정 제목 입력" class="quick-input">
                    <button type="submit" class="btn-quick-add">추가</button>
                </form>
            </div>

            <div class="shortcuts-section">
                <h3>유용한 단축키</h3>
                <ul class="shortcuts-list">
                    <li>
                        <span class="shortcut-name">오늘로 이동</span>
                        <kbd>T</kbd>
                    </li>
                    <li>
                        <span class="shortcut-name">이전 주/월</span>
                        <kbd>←</kbd>
                    </li>
                    <li>
                        <span class="shortcut-name">다음 주/월</span>
                        <kbd>→</kbd>
                    </li>
                    <li>
                        <span class="shortcut-name">새 일정</span>
                        <kbd>N</kbd>
                    </li>
                </ul>
            </div>
        </div>

        <!-- 이벤트 상세 뷰 -->
        <div class="right-panel-detail" id="rightPanelDetail" style="display: none;">
            <div class="detail-header">
                <h2>일정 상세</h2>
                <button class="btn-icon" id="closeDetailBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="detail-body">
                <form id="eventForm">
                    <input type="hidden" id="eventId">

                    <div class="form-group">
                        <input type="text" id="eventTitle" class="input-title" placeholder="일정 제목" required>
                    </div>

                    <div class="form-group">
                        <label class="label">
                            <i class="fas fa-tag"></i>
                            카테고리
                        </label>
                        <select id="eventCategory" class="select-input" required>
                            <!-- JavaScript로 동적 생성 -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="label">
                            <i class="fas fa-calendar"></i>
                            날짜
                        </label>
                        <div class="date-inputs">
                            <input type="date" id="eventStartDate" class="input-date" required>
                            <span>-</span>
                            <input type="date" id="eventEndDate" class="input-date">
                        </div>
                        <label class="checkbox-label">
                            <input type="checkbox" id="eventAllDay" checked>
                            <span>종일</span>
                        </label>
                    </div>

                    <div class="form-group" id="timeGroup" style="display: none;">
                        <label class="label">
                            <i class="fas fa-clock"></i>
                            시간
                        </label>
                        <div class="time-inputs">
                            <input type="time" id="eventStartTime" class="input-time">
                            <span>-</span>
                            <input type="time" id="eventEndTime" class="input-time">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label">
                            <i class="fas fa-align-left"></i>
                            설명
                        </label>
                        <textarea id="eventDescription" class="textarea-input" rows="4" placeholder="일정 설명 (선택사항)"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-delete" id="deleteEventBtn" style="display: none;">
                            <i class="fas fa-trash"></i>
                            삭제
                        </button>
                        <div class="action-buttons">
                            <button type="button" class="btn-secondary" id="cancelEventBtn">취소</button>
                            <button type="submit" class="btn-primary">저장</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </aside>
</div>

<!-- 카테고리 추가 모달 -->
<div class="modal-overlay" id="categoryModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>새 카테고리</h3>
            <button class="btn-icon" id="closeCategoryModalBtn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="categoryForm">
                <div class="form-group">
                    <label class="label">카테고리 이름</label>
                    <input type="text" id="categoryName" class="input-text" placeholder="예: 개인, 공부" required>
                </div>
                <div class="form-group">
                    <label class="label">색상</label>
                    <div class="color-palette" id="colorPalette">
                        <button type="button" class="color-btn active" data-color="#3b82f6" style="background: #3b82f6;"></button>
                        <button type="button" class="color-btn" data-color="#ef4444" style="background: #ef4444;"></button>
                        <button type="button" class="color-btn" data-color="#10b981" style="background: #10b981;"></button>
                        <button type="button" class="color-btn" data-color="#f59e0b" style="background: #f59e0b;"></button>
                        <button type="button" class="color-btn" data-color="#8b5cf6" style="background: #8b5cf6;"></button>
                        <button type="button" class="color-btn" data-color="#ec4899" style="background: #ec4899;"></button>
                        <button type="button" class="color-btn" data-color="#14b8a6" style="background: #14b8a6;"></button>
                        <button type="button" class="color-btn" data-color="#6366f1" style="background: #6366f1;"></button>
                    </div>
                    <input type="hidden" id="categoryColor" value="#3b82f6">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelCategoryBtn">취소</button>
                    <button type="submit" class="btn-primary">추가</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@6.1.10/index.global.min.js'></script>
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
{% endblock %}
